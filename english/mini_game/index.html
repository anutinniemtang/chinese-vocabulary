<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Label the Dinosaur!</title>
<style>
  :root{
    --green-dark:#1f4d2c;
    --green:#2f7a3f;
    --green-light:#4caf58;
    --cream:#fbf3d9;
    --brown:#7a4a25;
    --brown-dark:#5c3719;
    --red:#c0392b;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    font-family:'Comic Sans MS','Trebuchet MS',Verdana,sans-serif;
    background:radial-gradient(circle at 30% 20%, #3f8a4e, #163a20 80%);
    overflow:hidden;
    -webkit-user-select:none;user-select:none;
  }
  #app{position:relative;width:100%;height:100vh;height:100dvh;overflow:hidden;}
  .screen{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;
    transition:opacity .5s ease;
  }
  .screen.active{opacity:1;pointer-events:auto;}

  /* ---------- START SCREEN ---------- */
  #screen-start{gap:22px; text-align:center; padding:20px;}
  .avatar{
    width:140px;height:140px;border-radius:50%;
    background:#fbf3d9 url('avatar.png') center 42% / 150% no-repeat;
    border:6px solid var(--cream);
    box-shadow:0 6px 18px rgba(0,0,0,.4);
  }
  .title-plank{
    background:linear-gradient(180deg,var(--brown),var(--brown-dark));
    border:4px solid #3d2211;
    border-radius:16px;
    padding:14px 34px;
    box-shadow:0 6px 0 rgba(0,0,0,.3);
  }
  .title-plank h1{
    margin:0;color:var(--cream);font-size:clamp(24px,4vw,42px);
    text-shadow:2px 2px 0 rgba(0,0,0,.35);
  }
  .speech-bubble{
    background:var(--cream);color:#234a26;font-size:clamp(16px,2.4vw,22px);
    padding:12px 20px;border-radius:20px;font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,.25);
    max-width:420px;
  }
  .btn-row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
  .big-btn{
    font-family:inherit;font-weight:bold;font-size:clamp(16px,2.2vw,22px);
    padding:16px 30px;border-radius:50px;border:none;cursor:pointer;
    color:white;box-shadow:0 6px 0 rgba(0,0,0,.25);
    transition:transform .1s ease, box-shadow .1s ease;
  }
  .big-btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.25);}
  .btn-green{background:linear-gradient(180deg,#5fc26b,#2f8a3f);}
  .btn-amber{background:linear-gradient(180deg,#f2c14e,#d99a1e);}

  /* ---------- VIDEO SCREEN ---------- */
  #screen-video{background:#000;}
  #intro-video{width:100%;height:100%;object-fit:contain;background:#000;}
  #skip-video-btn{
    position:absolute;top:20px;right:20px;z-index:5;
    font-family:inherit;font-weight:bold;font-size:16px;
    padding:10px 20px;border-radius:30px;border:none;cursor:pointer;
    background:rgba(255,255,255,.85);color:#234a26;box-shadow:0 4px 0 rgba(0,0,0,.3);
  }

  /* ---------- GAME SCREEN ---------- */
  #screen-game{justify-content:flex-start;padding:10px 16px 16px;gap:8px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .game-header{
    width:100%;max-width:1100px;
    display:flex;align-items:center;gap:12px;
    background:linear-gradient(180deg,#2c6b39,#1c4a26);
    border-radius:14px;padding:8px 16px;
    box-shadow:0 4px 10px rgba(0,0,0,.3);
  }
  .header-avatar{
    width:56px;height:56px;border-radius:50%;flex-shrink:0;
    background:#fbf3d9 url('avatar.png') center 42% / 150% no-repeat;
    border:3px solid var(--cream);
  }
  .header-title{
    flex:1;text-align:center;color:var(--cream);
    font-size:clamp(18px,3vw,30px);font-weight:bold;
    text-shadow:2px 2px 0 rgba(0,0,0,.35);
  }
  .stars-box{
    display:flex;align-items:center;gap:6px;
    background:#123018;border-radius:10px;padding:6px 12px;
    color:#ffd54a;font-weight:bold;font-size:clamp(14px,2vw,20px);
    border:2px solid #ffd54a44;
  }
  .icon-btn{
    width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
    background:radial-gradient(circle,#5fc26b,#2f8a3f);color:white;font-size:20px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    box-shadow:0 3px 0 rgba(0,0,0,.3);
  }
  .instruction{
    color:var(--cream);font-size:clamp(13px,1.8vw,18px);font-weight:bold;
    text-shadow:1px 1px 0 rgba(0,0,0,.3);
  }

  #stage-wrap{
    width:100%;max-width:1100px;flex:1;
    display:flex;align-items:center;justify-content:center;
    min-height:0;min-width:0;
  }
  #dino-stage{
    position:relative;
    width:100%;
    aspect-ratio:2816/1536;
    max-width:100%;max-height:100%;
    background:
      radial-gradient(ellipse at 50% 100%, rgba(0,0,0,.25), transparent 60%),
      linear-gradient(180deg, rgba(200,230,190,.15), rgba(20,50,25,.25));
    border-radius:18px;
    border:3px solid #ffffff33;
    overflow:hidden;
  }
  #dino-img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:contain;
    filter:drop-shadow(0 10px 12px rgba(0,0,0,.4));
  }
  #line-svg{position:absolute;inset:0;width:100%;height:100%;}
  .connector-line{
    stroke:#fff6d1;stroke-width:.5;stroke-dasharray:2 1.4;
    opacity:.85;
  }
  .connector-line.done{stroke:#8bffa0;stroke-dasharray:none;stroke-width:.6;}
  .connector-dot{fill:#fff6d1;opacity:.9;}
  .connector-dot.done{fill:#8bffa0;}

  .dropzone{
    position:absolute;transform:translate(-50%,-50%);
    min-width:64px;
    padding:6px 10px;
    background:rgba(251,243,217,.92);
    border:3px solid var(--green);
    border-radius:10px;
    text-align:center;
    font-weight:bold;color:#234a26;
    font-size:clamp(11px,1.6vw,17px);
    box-shadow:0 3px 6px rgba(0,0,0,.3);
    min-height:1.6em;
    display:flex;align-items:center;justify-content:center;
    transition:box-shadow .2s ease, background .2s ease;
  }
  .dropzone.hint-pulse{
    animation:pulseGlow 1.1s ease-in-out infinite;
  }
  @keyframes pulseGlow{
    0%,100%{box-shadow:0 3px 6px rgba(0,0,0,.3), 0 0 0 0 rgba(255,213,74,.7);}
    50%{box-shadow:0 3px 6px rgba(0,0,0,.3), 0 0 0 10px rgba(255,213,74,0);}
  }
  .dropzone.filled{
    background:rgba(230,255,220,.97);
    border-color:#3fae4e;
  }
  .dropzone.shake-error{animation:shakeErr .4s ease;}
  @keyframes shakeErr{
    0%,100%{transform:translate(-50%,-50%);}
    20%{transform:translate(calc(-50% - 6px),-50%);border-color:var(--red);}
    40%{transform:translate(calc(-50% + 6px),-50%);}
    60%{transform:translate(calc(-50% - 4px),-50%);}
    80%{transform:translate(calc(-50% + 4px),-50%);}
  }

  #word-bank{
    width:100%;max-width:1100px;
    display:flex;flex-wrap:wrap;gap:10px;
    justify-content:center;align-items:center;
    background:rgba(15,40,20,.55);
    border-radius:16px;padding:12px;
    min-height:64px;
  }
  .chip-placeholder{visibility:hidden;}
  .word-chip{
    font-family:inherit;font-weight:bold;
    font-size:clamp(15px,2.4vw,22px);
    color:#234a26;
    background:linear-gradient(180deg,#fdf6e0,var(--cream));
    border:3px solid var(--green);
    border-radius:14px;
    padding:10px 20px;
    cursor:grab;
    touch-action:none;
    box-shadow:0 3px 0 rgba(0,0,0,.25);
    user-select:none;
    z-index:10;
  }
  .word-chip.dragging{
    cursor:grabbing;
    z-index:1000;
    box-shadow:0 10px 16px rgba(0,0,0,.4);
    transform:scale(1.08) rotate(-2deg);
    transition:none;
  }
  .word-chip.returning{
    transition:left .35s ease, top .35s ease, transform .35s ease;
  }
  .word-chip.arriving{
    transition:left .35s ease, top .35s ease, transform .35s ease;
  }
  .word-chip.placed{
    cursor:default;
    box-shadow:none;
    border-color:#3fae4e;
    padding:2px 4px;
    font-size:clamp(11px,1.6vw,17px);
    background:transparent;border:none;
  }
  @keyframes bounceHint{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
  }
  .word-chip.hint-bounce{animation:bounceHint 1s ease-in-out infinite;}

  /* feedback banner */
  #feedback-banner{
    position:absolute;left:50%;bottom:14%;transform:translate(-50%,20px);
    background:var(--cream);border:3px solid var(--green);border-radius:16px;
    padding:10px 22px;display:flex;align-items:center;gap:10px;
    font-size:clamp(16px,2.4vw,24px);font-weight:bold;color:#234a26;
    box-shadow:0 6px 14px rgba(0,0,0,.35);
    opacity:0;pointer-events:none;
    transition:opacity .3s ease, transform .3s ease;
    z-index:50;white-space:nowrap;
  }
  #feedback-banner.show{opacity:1;transform:translate(-50%,0);}
  #feedback-banner .word-hl{color:var(--red);}
  #feedback-banner .spk{font-size:22px;}

  /* ---------- CELEBRATION ---------- */
  #celebrate{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:20px;
    background:rgba(10,30,15,.85);
    opacity:0;pointer-events:none;transition:opacity .4s ease;
    z-index:200;text-align:center;padding:20px;
  }
  #celebrate.show{opacity:1;pointer-events:auto;}
  #celebrate h2{color:#ffe27a;font-size:clamp(28px,5vw,52px);margin:0;text-shadow:2px 2px 0 rgba(0,0,0,.4);}
  #celebrate p{color:var(--cream);font-size:clamp(16px,2.4vw,24px);margin:0;max-width:500px;}
  .stars-final{font-size:clamp(30px,6vw,60px);}
  .confetti{
    position:absolute;top:-40px;font-size:28px;
    animation:fall linear forwards;
  }
  @keyframes fall{
    to{transform:translateY(110vh) rotate(360deg);}
  }

  /* ---------- SHORT / LANDSCAPE VIEWPORTS ---------- */
  @media (max-height:520px){
    #screen-game{padding:6px 12px 10px;gap:4px;}
    .game-header{padding:4px 12px;}
    .header-avatar{width:36px;height:36px;}
    .instruction{font-size:clamp(11px,1.6vw,14px);}
    #word-bank{padding:8px;min-height:48px;gap:6px;}
    .word-chip{padding:6px 14px;font-size:clamp(12px,2vw,16px);}
  }
</style>
</head>
<body>
<div id="app">

  <!-- START SCREEN -->
  <div class="screen active" id="screen-start">
    <div class="avatar"></div>
    <div class="title-plank"><h1>Label the Dinosaur!</h1></div>
    <div class="speech-bubble">Hi! Help me label my body parts! 🦖</div>
    <div class="btn-row">
      <button class="big-btn btn-green" id="btn-watch-intro">▶ Watch Intro</button>
      <button class="big-btn btn-amber" id="btn-skip-intro">Skip to Game</button>
    </div>
  </div>

  <!-- VIDEO SCREEN -->
  <div class="screen" id="screen-video">
    <video id="intro-video" src="labelIntro.mp4" playsinline></video>
    <button id="skip-video-btn">Skip ▶</button>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen" id="screen-game">
    <div class="game-header">
      <div class="header-avatar"></div>
      <div class="header-title">Label the Dinosaur!</div>
      <div class="stars-box"><span>⭐</span><span id="star-count">0</span>/8</div>
      <button class="icon-btn" id="mute-btn" title="Mute narration">🔊</button>
      <button class="icon-btn" id="reset-btn" title="Play again">🔁</button>
    </div>
    <div class="instruction">Drag the correct word onto each part of the T-Rex!</div>

    <div id="stage-wrap">
      <div id="dino-stage">
        <svg id="line-svg" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
        <img id="dino-img" src="T-rexNoBG.png" alt="T-Rex">
        <!-- dropzones injected by JS -->
      </div>
    </div>

    <div id="word-bank"></div>

    <div id="feedback-banner"><span class="spk">🔊</span><span id="feedback-text"></span></div>
  </div>

  <!-- CELEBRATION -->
  <div id="celebrate">
    <div class="stars-final">⭐⭐⭐⭐⭐⭐⭐⭐</div>
    <h2>Amazing Job!</h2>
    <p>You labeled the whole T-Rex! You're a real dinosaur expert! 🦖🎉</p>
    <button class="big-btn btn-green" id="play-again-btn">Play Again</button>
  </div>

  <audio id="audio-sentences" src="trex_sentence.mp3" preload="auto"></audio>
  <audio id="audio-intro" src="introGame.mp3" preload="auto"></audio>
  <audio id="audio-win" src="endCongrat.mp3" preload="auto"></audio>

</div>

<script>
(function(){
  "use strict";

  // ---------- Label data (positions are % of the dino-stage box, 0-100) ----------
  // tx,ty = target point on the dinosaur body. bx,by = drop-zone box center.
  var LABELS = [
    { id:'head',  word:'Head',  tx:17.0, ty:8.5,  bx:8,  by:4,  sentence:'T-Rex has a head!',  clip:[0.00, 3.65] },
    { id:'eye',   word:'Eye',   tx:27.9, ty:14.0, bx:38, by:5,  sentence:'T-Rex has an eye!',  clip:[4.98, 8.36] },
    { id:'nose',  word:'Nose',  tx:15.6, ty:15.6, bx:4,  by:20, sentence:'T-Rex has a nose!',  clip:[9.85, 13.33] },
    { id:'mouth', word:'Mouth', tx:23.1, ty:35.8, bx:4,  by:44, sentence:'T-Rex has a mouth!', clip:[14.81, 18.10] },
    { id:'arm',   word:'Arm',   tx:38.4, ty:57.3, bx:30, by:68, sentence:'T-Rex has an arm!',  clip:[19.73, 23.12] },
    { id:'leg',   word:'Leg',   tx:66.1, ty:45.6, bx:62, by:68, sentence:'T-Rex has a leg!',   clip:[24.71, 27.90] },
    { id:'foot',  word:'Foot',  tx:52.2, ty:81.4, bx:44, by:95, sentence:'T-Rex has a foot!',  clip:[29.58, 32.84] },
    { id:'tail',  word:'Tail',  tx:95.2, ty:36.5, bx:90, by:8,  sentence:'T-Rex has a tail!',  clip:[34.54, 37.72] }
  ];

  var muted = false;
  var score = 0;
  var audioCtx = null;

  function ensureAudio(){
    if(!audioCtx){
      try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
    } else if(audioCtx.state === 'suspended'){
      audioCtx.resume();
    }
  }

  function playTone(freq, freq2, dur, type){
    if(muted || !audioCtx) return;
    var t0 = audioCtx.currentTime;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    if(freq2) osc.frequency.exponentialRampToValueAtTime(freq2, t0+dur);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(0.3, t0+0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0+dur+0.02);
  }

  function playSuccessSound(){
    playTone(523.25, 659.25, 0.16, 'triangle');
    setTimeout(function(){ playTone(659.25, 783.99, 0.18, 'triangle'); }, 140);
  }
  function playErrorSound(){
    playTone(220, 110, 0.3, 'square');
  }
  function playWinFanfare(){
    var notes=[523.25,659.25,783.99,1046.5];
    notes.forEach(function(n,i){ setTimeout(function(){ playTone(n, n*1.02, 0.22, 'triangle'); }, i*150); });
  }

  // ---------- Narration: recorded voice clips (with browser-TTS fallback) ----------
  var audioSentences = document.getElementById('audio-sentences');
  var audioIntro = document.getElementById('audio-intro');
  var audioWin = document.getElementById('audio-win');
  var clipStopTimer = null;
  var voiceFilesOk = true; // flips false if a recorded file fails to load

  audioSentences.addEventListener('error', function(){ voiceFilesOk = false; });
  audioIntro.addEventListener('error', function(){ voiceFilesOk = false; });
  audioWin.addEventListener('error', function(){ voiceFilesOk = false; });

  function stopSpeaking(){
    clearTimeout(clipStopTimer);
    [audioSentences, audioIntro, audioWin].forEach(function(a){
      try{ a.pause(); }catch(e){}
    });
    if('speechSynthesis' in window) window.speechSynthesis.cancel();
  }

  // Fallback: simple browser TTS (used only if a recorded audio file is missing/broken)
  function speakFallback(text){
    if(muted || !('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    var utter = new SpeechSynthesisUtterance(text);
    utter.rate = 0.88;
    utter.pitch = 1.25;
    utter.volume = 1;
    window.speechSynthesis.speak(utter);
  }

  // Plays the English+Thai clip for one body part, cut from trex_sentence.mp3
  function speakLabel(L){
    if(muted) return;
    if(!voiceFilesOk){ speakFallback(L.sentence); return; }
    clearTimeout(clipStopTimer);
    audioSentences.pause();
    audioSentences.currentTime = L.clip[0];
    var dur = L.clip[1] - L.clip[0];
    var p = audioSentences.play();
    if(p && p.catch) p.catch(function(){ speakFallback(L.sentence); });
    clipStopTimer = setTimeout(function(){ audioSentences.pause(); }, dur*1000);
  }

  function speakIntro(){
    if(muted) return;
    if(!voiceFilesOk){ speakFallback("Let's label the T-Rex! Drag each word to the right part."); return; }
    audioIntro.currentTime = 0;
    var p = audioIntro.play();
    if(p && p.catch) p.catch(function(){ speakFallback("Let's label the T-Rex! Drag each word to the right part."); });
  }

  function speakWin(){
    if(muted) return;
    if(!voiceFilesOk){ speakFallback("Wow! You labeled the whole T-Rex! You're a dinosaur expert! Great job!"); return; }
    audioWin.currentTime = 0;
    var p = audioWin.play();
    if(p && p.catch) p.catch(function(){ speakFallback("Wow! You labeled the whole T-Rex! You're a dinosaur expert! Great job!"); });
  }

  // ---------- Screen management ----------
  var screens = {
    start: document.getElementById('screen-start'),
    video: document.getElementById('screen-video'),
    game: document.getElementById('screen-game')
  };
  function showScreen(name){
    Object.keys(screens).forEach(function(k){
      screens[k].classList.toggle('active', k===name);
    });
  }

  document.getElementById('btn-watch-intro').addEventListener('click', function(){
    ensureAudio();
    showScreen('video');
    var v = document.getElementById('intro-video');
    v.currentTime = 0;
    v.muted = false;
    v.play().catch(function(){ /* if blocked, user can use skip */ });
  });
  document.getElementById('btn-skip-intro').addEventListener('click', function(){
    ensureAudio();
    startGame();
  });
  document.getElementById('skip-video-btn').addEventListener('click', function(){
    var v = document.getElementById('intro-video');
    v.pause();
    startGame();
  });
  document.getElementById('intro-video').addEventListener('ended', function(){
    startGame();
  });

  function startGame(){
    showScreen('game');
    speakIntro();
  }

  // ---------- Build stage: connector lines + dropzones ----------
  var svg = document.getElementById('line-svg');
  var stage = document.getElementById('dino-stage');
  var stageWrap = document.getElementById('stage-wrap');
  var bank = document.getElementById('word-bank');

  // Keep #dino-stage exactly matching the image's aspect ratio while fitting
  // inside stage-wrap (both width- and height-constrained), so the % based
  // dropzone/line coordinates always line up with the rendered image.
  var STAGE_RATIO = 2816/1536;
  function fitStage(){
    var cw = stageWrap.clientWidth;
    var ch = stageWrap.clientHeight;
    if(!cw || !ch) return;
    var w = cw, h = w / STAGE_RATIO;
    if(h > ch){ h = ch; w = h * STAGE_RATIO; }
    stage.style.width = w + 'px';
    stage.style.height = h + 'px';
  }
  window.addEventListener('resize', fitStage);
  window.addEventListener('orientationchange', function(){ setTimeout(fitStage, 100); });

  LABELS.forEach(function(L){
    var line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', L.bx); line.setAttribute('y1', L.by);
    line.setAttribute('x2', L.tx); line.setAttribute('y2', L.ty);
    line.setAttribute('class','connector-line');
    line.setAttribute('id','line-'+L.id);
    svg.appendChild(line);

    var dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx', L.tx); dot.setAttribute('cy', L.ty);
    dot.setAttribute('r', 1.1);
    dot.setAttribute('class','connector-dot');
    dot.setAttribute('id','dot-'+L.id);
    svg.appendChild(dot);

    var dz = document.createElement('div');
    dz.className = 'dropzone';
    dz.dataset.label = L.id;
    dz.style.left = L.bx+'%';
    dz.style.top = L.by+'%';
    dz.id = 'zone-'+L.id;
    stage.appendChild(dz);
  });

  // ---------- Build word bank (shuffled) ----------
  function shuffle(arr){
    var a = arr.slice();
    for(var i=a.length-1;i>0;i--){
      var j = Math.floor(Math.random()*(i+1));
      var tmp=a[i]; a[i]=a[j]; a[j]=tmp;
    }
    return a;
  }

  var chips = {}; // id -> chip element

  function buildBank(){
    bank.innerHTML = '';
    chips = {};
    var order = shuffle(LABELS);
    order.forEach(function(L){
      var chip = document.createElement('div');
      chip.className = 'word-chip';
      chip.dataset.label = L.id;
      chip.textContent = L.word;
      chip.addEventListener('pointerdown', onPointerDown);
      bank.appendChild(chip);
      chips[L.id] = chip;
    });
    updateHint();
  }

  function updateHint(){
    document.querySelectorAll('.hint-bounce').forEach(function(el){ el.classList.remove('hint-bounce'); });
    document.querySelectorAll('.hint-pulse').forEach(function(el){ el.classList.remove('hint-pulse'); });
    var next = bank.querySelector('.word-chip:not(.placed)');
    if(next){
      next.classList.add('hint-bounce');
      var zone = document.getElementById('zone-'+next.dataset.label);
      if(zone) zone.classList.add('hint-pulse');
    }
  }

  // ---------- Drag logic ----------
  var dragState = null;

  function onPointerDown(e){
    var chip = e.currentTarget;
    if(chip.classList.contains('placed')) return;
    ensureAudio();
    e.preventDefault();
    var rect = chip.getBoundingClientRect();
    var placeholder = document.createElement('span');
    placeholder.className = 'chip-placeholder word-chip';
    placeholder.style.width = rect.width+'px';
    placeholder.style.height = rect.height+'px';
    chip.parentNode.insertBefore(placeholder, chip);

    document.body.appendChild(chip);
    chip.style.position = 'fixed';
    chip.style.left = rect.left+'px';
    chip.style.top = rect.top+'px';
    chip.style.width = rect.width+'px';
    chip.classList.add('dragging');

    dragState = {
      chip: chip,
      placeholder: placeholder,
      offsetX: e.clientX - rect.left,
      offsetY: e.clientY - rect.top
    };
    chip.setPointerCapture(e.pointerId);
    chip.addEventListener('pointermove', onPointerMove);
    chip.addEventListener('pointerup', onPointerUp);
    chip.addEventListener('pointercancel', onPointerUp);
  }

  function onPointerMove(e){
    if(!dragState) return;
    dragState.chip.style.left = (e.clientX - dragState.offsetX)+'px';
    dragState.chip.style.top = (e.clientY - dragState.offsetY)+'px';
  }

  function onPointerUp(e){
    if(!dragState) return;
    var chip = dragState.chip;
    var placeholder = dragState.placeholder;
    chip.removeEventListener('pointermove', onPointerMove);
    chip.removeEventListener('pointerup', onPointerUp);
    chip.removeEventListener('pointercancel', onPointerUp);
    chip.classList.remove('dragging');

    var px = e.clientX, py = e.clientY;
    var targetZone = null;
    document.querySelectorAll('.dropzone').forEach(function(dz){
      if(targetZone) return;
      var r = dz.getBoundingClientRect();
      var pad = 14;
      if(px >= r.left-pad && px <= r.right+pad && py >= r.top-pad && py <= r.bottom+pad){
        targetZone = dz;
      }
    });

    if(targetZone && !targetZone.classList.contains('filled') && targetZone.dataset.label === chip.dataset.label){
      correctDrop(chip, placeholder, targetZone);
    } else if(targetZone && !targetZone.classList.contains('filled') && targetZone.dataset.label !== chip.dataset.label){
      wrongDrop(chip, placeholder, targetZone);
    } else {
      returnToBank(chip, placeholder);
    }
    dragState = null;
  }

  function correctDrop(chip, placeholder, zone){
    var zr = zone.getBoundingClientRect();
    chip.classList.add('arriving');
    chip.style.left = (zr.left + zr.width/2 - chip.offsetWidth/2)+'px';
    chip.style.top = (zr.top + zr.height/2 - chip.offsetHeight/2)+'px';
    var labelId = chip.dataset.label;
    setTimeout(function(){
      placeholder.remove();
      chip.classList.remove('arriving');
      chip.classList.add('placed');
      chip.style.position = 'static';
      chip.style.left = ''; chip.style.top=''; chip.style.width='';
      zone.appendChild(chip);
      zone.classList.add('filled');
      document.getElementById('line-'+labelId).classList.add('done');
      document.getElementById('dot-'+labelId).classList.add('done');

      score++;
      document.getElementById('star-count').textContent = score;
      playSuccessSound();
      var L = LABELS.filter(function(x){return x.id===labelId;})[0];
      showFeedback(L.sentence, L.word);
      speakLabel(L);
      updateHint();

      if(score >= LABELS.length){
        setTimeout(celebrate, 1200);
      }
    }, 360);
  }

  function wrongDrop(chip, placeholder, zone){
    playErrorSound();
    zone.classList.add('shake-error');
    setTimeout(function(){ zone.classList.remove('shake-error'); }, 400);
    returnToBank(chip, placeholder);
  }

  function returnToBank(chip, placeholder){
    var pr = placeholder.getBoundingClientRect();
    chip.classList.add('returning');
    chip.style.left = pr.left+'px';
    chip.style.top = pr.top+'px';
    setTimeout(function(){
      placeholder.parentNode.insertBefore(chip, placeholder);
      placeholder.remove();
      chip.classList.remove('returning');
      chip.style.position = 'static';
      chip.style.left=''; chip.style.top=''; chip.style.width='';
    }, 360);
  }

  var feedbackTimer = null;
  function showFeedback(sentence, word){
    var banner = document.getElementById('feedback-banner');
    var textEl = document.getElementById('feedback-text');
    var html = sentence.replace(word, '<span class="word-hl">'+word+'</span>');
    textEl.innerHTML = html;
    banner.classList.add('show');
    clearTimeout(feedbackTimer);
    feedbackTimer = setTimeout(function(){ banner.classList.remove('show'); }, 2200);
  }

  function celebrate(){
    speakWin();
    playWinFanfare();
    var el = document.getElementById('celebrate');
    el.classList.add('show');
    spawnConfetti(el);
  }

  function spawnConfetti(container){
    var emojis = ['⭐','🦖','🎉','✨'];
    for(var i=0;i<24;i++){
      (function(i){
        setTimeout(function(){
          var s = document.createElement('span');
          s.className = 'confetti';
          s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
          s.style.left = Math.random()*100+'%';
          s.style.animationDuration = (2.5+Math.random()*2)+'s';
          container.appendChild(s);
          setTimeout(function(){ s.remove(); }, 5000);
        }, i*120);
      })(i);
    }
  }

  document.getElementById('play-again-btn').addEventListener('click', function(){
    document.getElementById('celebrate').classList.remove('show');
    document.querySelectorAll('.confetti').forEach(function(c){c.remove();});
    resetGame();
  });

  document.getElementById('reset-btn').addEventListener('click', function(){
    stopSpeaking();
    resetGame();
  });

  function resetGame(){
    score = 0;
    document.getElementById('star-count').textContent = '0';
    document.querySelectorAll('.dropzone').forEach(function(dz){
      dz.classList.remove('filled','shake-error','hint-pulse');
      dz.innerHTML = '';
    });
    document.querySelectorAll('.connector-line').forEach(function(l){ l.classList.remove('done'); });
    document.querySelectorAll('.connector-dot').forEach(function(d){ d.classList.remove('done'); });
    buildBank();
  }

  document.getElementById('mute-btn').addEventListener('click', function(){
    muted = !muted;
    document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
    if(muted) stopSpeaking();
  });

  // init
  buildBank();
  fitStage();
})();
</script>
</body>
</html>
