<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เลือกวิชา</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #fff4df, #eaf6ff);
      display: grid;
      place-items: center;
      color: #2f3542;
    }

    .container {
      width: min(900px, 92%);
      text-align: center;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      margin-bottom: 8px;
    }

    p {
      color: #667085;
      font-size: 1.1rem;
      margin-bottom: 30px;
    }

    .subjects {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 22px;
}

    .subject-card {
      text-decoration: none;
      color: inherit;
      background: white;
      border-radius: 24px;
      padding: 32px 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .subject-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.14);
    }

    .icon {
      font-size: 4.5rem;
      margin-bottom: 12px;
    }

    .subject-card h2 {
      margin: 0 0 8px;
      font-size: 1.8rem;
    }

    .subject-card span {
      color: #697386;
    }

    @media (max-width: 600px) {
      .subjects {
        grid-template-columns: 1fr;
      }

      .subject-card {
        padding: 24px 18px;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>เลือกวิชาที่อยากเรียน</h1>
    <p>แตะที่วิชาเพื่อเริ่มเล่น</p>

    <section class="subjects">
<a class="subject-card english-card" href="english/index.html">
  <div class="subject-icon">🧟</div>
  <h2>ภาษาอังกฤษ</h2>
  <p>English</p>
  <span>Magic S · เวทมนตร์ตัว S</span>
</a>

  <a class="subject-card" href="thai/index.html">
    <div class="icon">📖</div>
    <h2>ภาษาไทย</h2>
    <span>เกมเรียงประโยค</span>
  </a>

  <a class="subject-card" href="social/index.html">
    <div class="icon">🙏</div>
    <h2>สังคมศึกษา</h2>
    <span>วันสำคัญทางศาสนา</span>
  </a>

  <a class="subject-card" href="chinese/index.html">
    <div class="icon">🀄</div>
    <h2>ภาษาจีน</h2>
    <span>คำศัพท์และเสียงอ่าน</span>
  </a>

</section>
  </main>
</body>
</html>
